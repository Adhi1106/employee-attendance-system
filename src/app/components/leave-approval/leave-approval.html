<section class="approval-page">
  <mat-card class="approval-card">
    <h2>Leave Approval</h2>
    <p class="subtitle">Review pending leave requests and update status.</p>

    <div class="loading-state" *ngIf="isLoading">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>

    <p class="empty-state" *ngIf="!isLoading && leaveRequests.length === 0">No leave requests yet.</p>

    <div class="table-wrap" *ngIf="!isLoading && leaveRequests.length > 0">
      <table mat-table [dataSource]="leaveRequests" class="approval-table">
        <ng-container matColumnDef="employee">
          <th mat-header-cell *matHeaderCellDef>Employee</th>
          <td mat-cell *matCellDef="let request">{{ request.employee }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Leave Type</th>
          <td mat-cell *matCellDef="let request">{{ request.type }}</td>
        </ng-container>

        <ng-container matColumnDef="start">
          <th mat-header-cell *matHeaderCellDef>Start Date</th>
          <td mat-cell *matCellDef="let request">{{ request.start }}</td>
        </ng-container>

        <ng-container matColumnDef="end">
          <th mat-header-cell *matHeaderCellDef>End Date</th>
          <td mat-cell *matCellDef="let request">{{ request.end }}</td>
        </ng-container>

        <ng-container matColumnDef="reason">
          <th mat-header-cell *matHeaderCellDef>Reason</th>
          <td mat-cell *matCellDef="let request">{{ request.reason }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let request">
            <mat-chip class="status-chip" [ngClass]="getChipClass(request.status)">
              {{ request.status }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let request">
            <div class="action-buttons">
              <button
                mat-flat-button
                color="primary"
                (click)="updateStatus(request, 'Approved')"
                [disabled]="isProcessing(request.id)"
              >
                {{ isProcessing(request.id) ? 'Updating...' : 'Approve' }}
              </button>
              <button
                mat-stroked-button
                color="warn"
                (click)="updateStatus(request, 'Rejected')"
                [disabled]="isProcessing(request.id)"
              >
                Reject
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </mat-card>
</section>
