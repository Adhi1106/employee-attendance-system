<section class="leave-page">
  <mat-card class="leave-card">
    <h2>Apply Leave</h2>
    <p class="subtitle">Submit a leave request for approval.</p>

    <form [formGroup]="leaveForm" class="leave-form" (ngSubmit)="submitLeave()">
      <mat-form-field appearance="outline">
        <mat-label>Employee Name</mat-label>
        <mat-select formControlName="employeeId">
          <mat-option *ngFor="let employee of employees" [value]="employee.id">
            {{ employee.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <p class="hint-text" *ngIf="!isLoadingEmployees && employees.length === 0">
        No employees found. Please add employees from the HR panel first.
      </p>

      <mat-form-field appearance="outline">
        <mat-label>Leave Type</mat-label>
        <mat-select formControlName="type">
          <mat-option *ngFor="let type of leaveTypes" [value]="type">{{ type }}</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="grid-two">
        <mat-form-field appearance="outline">
          <mat-label>Start Date</mat-label>
          <input matInput [matDatepicker]="startPicker" [min]="minDate" formControlName="start" />
          <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>End Date</mat-label>
          <input matInput [matDatepicker]="endPicker" [min]="minDate" formControlName="end" />
          <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline">
        <mat-label>Reason</mat-label>
        <textarea matInput rows="4" formControlName="reason"></textarea>
      </mat-form-field>

      <p class="error-message" *ngIf="leaveForm.hasError('invalidDateRange')">
        End date must be after start date.
      </p>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="isSubmitting || isLoadingEmployees || employees.length === 0 || leaveForm.invalid"
      >
        {{ isSubmitting ? 'Submitting...' : 'Submit Leave' }}
      </button>
    </form>
  </mat-card>
</section>
