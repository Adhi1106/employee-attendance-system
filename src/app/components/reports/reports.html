<section class="reports-page">
  <h2>Reports</h2>

  <div class="report-grid">
    <mat-card class="report-card">
      <h3>Total Employees</h3>
      <p>{{ totalEmployees }}</p>
    </mat-card>

    <mat-card class="report-card">
      <h3>Attendance Records</h3>
      <p>{{ totalAttendanceRecords }}</p>
    </mat-card>

    <mat-card class="report-card">
      <h3>Total Leave Requests</h3>
      <p>{{ totalLeaves }}</p>
    </mat-card>

    <mat-card class="report-card">
      <h3>Pending Leaves</h3>
      <p>{{ pendingLeaves }}</p>
    </mat-card>
  </div>
</section>
