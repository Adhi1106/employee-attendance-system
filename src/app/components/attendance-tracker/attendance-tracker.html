<section class="attendance-page">
  <mat-card class="attendance-card">
    <h2>Attendance Tracker</h2>

    <div class="table-wrap">
      <table mat-table [dataSource]="attendanceRecords" class="attendance-table">
        <ng-container matColumnDef="employeeName">
          <th mat-header-cell *matHeaderCellDef>Employee</th>
          <td mat-cell *matCellDef="let record">{{ record.employeeName || record.employeeId }}</td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let record">{{ record.date }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let record">{{ record.status }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          [appHighlightAbsent]="row.status"
        ></tr>
      </table>
    </div>
  </mat-card>
</section>
