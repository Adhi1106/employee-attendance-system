<section class="dashboard-page">
  <header class="dashboard-header">
    <h2>HR Dashboard</h2>
    <p>Real-time overview of workforce attendance and leave activity.</p>
  </header>

  <div class="metric-grid">
    <mat-card
      *ngFor="let card of statCards; let i = index"
      class="metric-card"
      [@cardEnter]="{ value: 'in', params: { delay: (i + 1) * 120 } }"
    >
      <div class="metric-icon" [ngClass]="card.className">
        <mat-icon>{{ card.icon }}</mat-icon>
      </div>
      <div class="metric-content">
        <span class="metric-label">{{ card.label }}</span>
        <h3>{{ getCounterValue(card.key) }}</h3>
      </div>
    </mat-card>
  </div>

  <div class="chart-grid">
    <mat-card class="chart-card">
      <h3>Weekly Attendance</h3>
      <div class="chart-wrap">
        <canvas
          baseChart
          [type]="attendanceChartType"
          [data]="attendanceChartData"
          [options]="attendanceChartOptions"
        ></canvas>
      </div>
    </mat-card>

    <mat-card class="chart-card">
      <h3>Leave Distribution</h3>
      <div class="chart-wrap">
        <canvas baseChart [type]="leaveChartType" [data]="leaveChartData" [options]="leaveChartOptions"></canvas>
      </div>
    </mat-card>
  </div>
</section>
