<mat-toolbar class="top-toolbar">
  <button
    mat-icon-button
    type="button"
    (click)="toggleSidenav()"
    aria-label="Toggle sidebar"
    class="menu-btn"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <span class="app-title">Employee Attendance &amp; Leave Management System</span>

  <div class="role-switcher" role="group" aria-label="Role Switcher">
    <button
      mat-button
      type="button"
      class="role-btn"
      [class.active]="selectedRole === 'Employee'"
      (click)="onRoleChange('Employee')"
    >
      <mat-icon>person</mat-icon>
      <span>Employee</span>
    </button>
    <button
      mat-button
      type="button"
      class="role-btn"
      [class.active]="selectedRole === 'HR'"
      (click)="onRoleChange('HR')"
    >
      <mat-icon>badge</mat-icon>
      <span>HR</span>
    </button>
  </div>
</mat-toolbar>

<mat-sidenav-container class="layout-container">
  <mat-sidenav
    class="app-sidenav"
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="isSidenavOpened"
    [fixedInViewport]="isMobile"
    fixedTopGap="64"
  >
    <mat-nav-list>
      <a
        *ngFor="let item of navItems"
        mat-list-item
        [routerLink]="item.route"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        routerLinkActive="active-link"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="layout-content">
    <main class="content-shell" @pageEnter>
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
